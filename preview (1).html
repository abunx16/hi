<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dodge Game</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: black;
        color: white;
        font-family: Arial, sans-serif;
        text-align: center;
    }
    canvas {
        display: block;
    }
    #score {
        position: absolute;
        top: 10px;
        left: 10px;
        font-size: 20px;
    }
</style>
</head>
<body>

<div id="score">Score: 0</div>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player = {
    x: canvas.width / 2,
    y: canvas.height - 80,
    size: 30
};

let blocks = [];
let score = 0;
let gameOver = false;

// Touch controls
canvas.addEventListener("touchmove", function(e) {
    let touch = e.touches[0];
    player.x = touch.clientX;
});

// Spawn blocks
function spawnBlock() {
    blocks.push({
        x: Math.random() * canvas.width,
        y: -20,
        size: 20 + Math.random() * 30,
        speed: 2 + score * 0.05
    });
}

// Game loop
function update() {
    if (gameOver) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw player
    ctx.fillStyle = "lime";
    ctx.fillRect(player.x - player.size/2, player.y, player.size, player.size);

    // Blocks
    ctx.fillStyle = "red";
    for (let i = 0; i < blocks.length; i++) {
        let b = blocks[i];
        b.y += b.speed;

        ctx.fillRect(b.x, b.y, b.size, b.size);

        // Collision
        if (
            b.x < player.x + player.size &&
            b.x + b.size > player.x - player.size &&
            b.y < player.y + player.size &&
            b.y + b.size > player.y
        ) {
            gameOver = true;
            alert("Game Over! Score: " + score);
            location.reload();
        }
    }

    // Score
    score++;
    document.getElementById("score").innerText = "Score: " + score;

    requestAnimationFrame(update);
}

// Spawn blocks repeatedly
setInterval(spawnBlock, 800);

// Start game
update();
</script>

</body>
</html>
